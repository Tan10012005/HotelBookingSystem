<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Quản lý booking — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
    <style>
        :root {
            --accent: #7c3aed;
            --sidebar: #1e1b4b;
            --accent-1: #29a14a;
            --muted: #6b7280;
            --card: #fff;
            --bg: #f5f3ff;
            --radius: 12px;
            --shadow: 0 8px 24px rgba(11, 24, 40, 0.06)
        }

        * { box-sizing: border-box; }

        body {
            font-family: Inter, system-ui;
            margin: 0;
            background: var(--bg);
            color: #0f172a
        }

        /* ===== SIDEBAR ===== */
        .sidebar { width: 240px; position: fixed; top: 0; left: 0; height: 100vh; background: var(--sidebar); padding: 28px 0; z-index: 100; }
        .sidebar-logo { color: white; font-size: 17px; font-weight: 700; padding: 0 24px 28px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-menu { list-style: none; margin: 20px 0 0; padding: 0; }
        .sidebar-menu a { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: rgba(255,255,255,0.12); color: white; border-left: 3px solid var(--accent); padding-left: 21px; }
        .sidebar-menu a.active { background: rgba(124,58,237,0.25); }

        /* ===== MAIN ===== */
        .main { margin-left: 240px; padding: 32px; }

        .page-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .page-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px
        }

        .card {
            background: var(--card);
            padding: 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #eef2f6;
            font-size: 14px;
            white-space: nowrap;
        }

        th {
            color: var(--muted);
            font-weight: 700;
            font-size: 13px
        }

        .badge {
            padding: 6px 8px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 12px
        }

        .status-pending {
            background: #fff7ed;
            color: #92400e
        }

        .status-confirmed {
            background: #ecfdf5;
            color: #065f46
        }

        .status-cancelled {
            background: #fff1f2;
            color: #b91c1c
        }

        .refund-none { color: #9ca3af; }
        .refund-requested { color: #d97706; font-weight: 600; }
        .refund-transferred { color: #2563eb; font-weight: 600; }
        .refund-received { color: #059669; font-weight: 600; }

        .btn {
            background: linear-gradient(90deg, var(--accent-1), #178e3a);
            color: white;
            padding: 8px 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
        }

        .btn-danger {
            background: #ef4444
        }

        .actions form {
            display: inline-block;
            margin-right: 6px
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-logo">🏨 Hotel Admin</div>
    <ul class="sidebar-menu">
        <li><a th:href="@{/admin/dashboard}"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
        <li><a th:href="@{/admin/users}"><i class="fa-solid fa-users"></i> Người dùng</a></li>
        <li><a th:href="@{/admin/rooms}"><i class="fa-solid fa-door-open"></i> Phòng</a></li>
        <li><a th:href="@{/admin/bookings}" class="active"><i class="fa-solid fa-calendar-check"></i> Booking</a></li>
        <li><a th:href="@{/admin/roomchanges}"><i class="fa-solid fa-arrows-rotate"></i> Đổi phòng</a></li>
        <li><a th:href="@{/admin/logout}"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a></li>
    </ul>
</div>

<!-- Main -->
<div class="main">
    <div class="head">
        <div>
            <div class="page-title">📋 Quản lý booking</div>
            <div class="page-subtitle">Xác nhận, huỷ và xử lý hoàn tiền</div>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Room</th>
                <th>Check-in</th>
                <th>Check-out</th>
                <th>Giá</th>
                <th>Trạng thái</th>
                <th>Refund</th>
                <th>Hành động</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="b : ${bookings}">
                <td th:text="${b.id}">1</td>
                <td th:text="${b.user.email}">user@test.com</td>
                <td th:text="${b.room.roomNumber}">101</td>
                <td th:text="${#temporals.format(b.checkIn,'yyyy-MM-dd')}">2026-01-01</td>
                <td th:text="${#temporals.format(b.checkOut,'yyyy-MM-dd')}">2026-01-05</td>
                <td th:text="${#numbers.formatDecimal(b.totalPrice,0,'COMMA',0,'POINT')} + ' VND'">
                    1,000,000 VND
                </td>

                <!-- BOOKING STATUS -->
                <td>
                    <span th:if="${b.status.name()=='PENDING_CONFIRM'}" class="badge status-pending">⏳ Chờ</span>
                    <span th:if="${b.status.name()=='CONFIRMED'}" class="badge status-confirmed">✓ OK</span>
                    <span th:if="${b.status.name()=='CANCELLED'}" class="badge status-cancelled">✗ Huỷ</span>
                </td>

                <!-- REFUND STATUS -->
                <td th:text="${b.refundStatus}">NONE</td>

                <!-- ACTIONS -->
                <td class="actions">
                    <!-- ACCEPT -->
                    <form th:if="${b.status.name()=='PENDING_CONFIRM'}"
                          th:action="@{/admin/bookings/{id}/accept(id=${b.id})}"
                          method="post">
                        <button class="btn" type="submit">Accept</button>
                    </form>

                    <!-- DENY -->
                    <form th:if="${b.status.name()=='PENDING_CONFIRM'}"
                          th:action="@{/admin/bookings/{id}/deny(id=${b.id})}"
                          method="post"
                          onsubmit="return confirm('Bạn chắc chắn muốn từ chối booking này?');">
                        <button class="btn btn-danger" type="submit">Deny</button>
                    </form>

                    <!-- REFUND TRANSFERRED -->
                    <form th:if="${b.status.name()=='CANCELLED' and b.refundStatus.name()=='REQUESTED'}"
                          th:action="@{/admin/bookings/{id}/refund-transferred(id=${b.id})}"
                          method="post">
                        <button class="btn" type="submit">💸 Đã chuyển tiền</button>
                    </form>

                    <span th:if="${b.status.name()!='PENDING_CONFIRM'
                                  and b.refundStatus.name()!='REQUESTED'}"
                          style="color:#9ca3af;font-weight:600">—</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
