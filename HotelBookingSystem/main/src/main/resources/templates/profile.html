<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hồ sơ người dùng - Hotel Booking</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          crossorigin="anonymous"/>

    <style>
        * { box-sizing: border-box; }

        :root {
            --card-bg: rgba(255, 255, 255, 0.96);
            --accent: #006340;
            --accent-light: #0d8a5f;
            --muted: #6b7280;
            --radius: 20px;
            --shadow: 0 15px 45px rgba(0, 0, 0, 0.12);
        }

        html, body { margin: 0; padding: 0; font-family: Inter, sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 720px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            animation: fadeInUp .8s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 6px;
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .subtitle { color: var(--muted); margin-bottom: 28px; font-size: 15px; }

        .alert { padding: 14px 18px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 600; }
        .alert-error   { background: #fee2e2; color: #991b1b; }
        .alert-success { background: #dcfce7; color: #166534; }

        .status-card {
            background: #dcfce7;
            border: 1.5px solid #86efac;
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
            color: #166534;
        }
        .status-card.incomplete {
            background: #fef9c3;
            border-color: #fde047;
            color: #854d0e;
        }

        /* ===== WALLET CARD ===== */
        .wallet-card {
            background: linear-gradient(135deg, #5b21b6 0%, #7c3aed 60%, #a855f7 100%);
            border-radius: 16px;
            padding: 24px 28px;
            margin-bottom: 28px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 24px rgba(91, 33, 182, 0.3);
            position: relative;
            overflow: hidden;
        }
        .wallet-card::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 160px; height: 160px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }
        .wallet-card::after {
            content: '';
            position: absolute;
            bottom: -30px; left: 60px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .wallet-left { position: relative; z-index: 1; }
        .wallet-label {
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: .5px;
            font-weight: 700;
        }
        .wallet-balance {
            font-size: 34px;
            font-weight: 800;
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.5px;
        }
        .wallet-sub {
            font-size: 12px;
            opacity: 0.75;
            margin-top: 6px;
        }
        .wallet-icon {
            position: relative;
            z-index: 1;
            font-size: 52px;
            opacity: 0.35;
        }

        /* ===== FORM ===== */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f3f4f6;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: Inter, sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f9fafb;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 99, 64, 0.08);
            background: white;
        }

        input:disabled {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .input-hint { font-size: 12px; color: var(--muted); margin-top: 5px; }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); }

        @media (max-width: 480px) {
            .container { padding: 24px 20px; }
            h2 { font-size: 24px; }
            .wallet-balance { font-size: 26px; }
            .wallet-icon { font-size: 40px; }
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>
    <div class="container">

        <h2><i class="fa-solid fa-user-gear"></i> Hồ sơ người dùng</h2>
        <p class="subtitle">Cập nhật thông tin để đặt phòng khách sạn</p>

        <!-- Flash messages -->
        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Profile status -->
        <div class="status-card" th:classappend="${user.isProfileComplete()} ? '' : 'incomplete'">
            <div>
                <strong th:text="${user.isProfileComplete()} ? '✅ Hồ sơ đã hoàn thiện' : '⚠️ Hồ sơ chưa hoàn thiện'"></strong>
                <div style="font-size:13px;margin-top:3px;"
                     th:text="${user.isProfileComplete()}
                         ? 'Bạn có thể đặt phòng ngay bây giờ'
                         : 'Vui lòng cập nhật đầy đủ thông tin để đặt phòng'">
                </div>
            </div>
        </div>

        <!-- ===== WALLET CARD ===== -->
        <!--
            walletBalance được truyền từ ProfileController.
            Dùng biến model 'walletBalance', KHÔNG gọi user.safeWalletBalance()
            vì ví được lưu ở bảng wallets riêng, không phải trong User entity.
        -->
        <div class="wallet-card">
            <div class="wallet-left">
                <div class="wallet-label">
                    <i class="fa-solid fa-wallet"></i> Số dư ví hoàn tiền
                </div>
                <div class="wallet-balance"
                     th:text="${#numbers.formatDecimal(walletBalance, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                    0 VND
                </div>
                <div class="wallet-sub">
                    Tiền hoàn từ đơn hủy · Dùng được khi đặt phòng &amp; nâng cấp hạng
                </div>
            </div>
            <div class="wallet-icon">🪙</div>
        </div>

        <!-- Form thông tin cá nhân -->
        <div class="section-title">
            <i class="fa-solid fa-circle-info" style="color: var(--accent)"></i>
            Thông tin cá nhân
        </div>

        <form th:action="@{/profile/update}" method="post">

            <div class="form-group">
                <label for="email"><i class="fa-solid fa-envelope"></i> Email đăng nhập</label>
                <input type="email" id="email" th:value="${user.email}" disabled/>
                <div class="input-hint">Email không thể thay đổi</div>
            </div>

            <div class="form-group">
                <label for="fullName"><i class="fa-solid fa-user"></i> Họ và tên</label>
                <input type="text" id="fullName" name="fullName"
                       th:value="${user.fullName}"
                       placeholder="Nguyễn Văn A" required/>
            </div>

            <div class="form-group">
                <label for="phoneNumber"><i class="fa-solid fa-phone"></i> Số điện thoại</label>
                <input type="tel" id="phoneNumber" name="phoneNumber"
                       th:value="${user.phoneNumber}"
                       placeholder="0901234567"
                       pattern="^0[0-9]{9,10}$"
                       required/>
            </div>

            <div class="form-group">
                <label for="citizenId"><i class="fa-solid fa-id-card"></i> Số CCCD/CMND</label>
                <input type="text" id="citizenId" name="citizenId"
                       th:value="${user.citizenId}"
                       placeholder="001234567890"
                       pattern="^[0-9]{9,12}$"
                       required/>
            </div>

            <button type="submit" class="btn-primary">
                <i class="fa-solid fa-floppy-disk"></i> Lưu thông tin
            </button>
        </form>

    </div>
</main>

<div th:replace="~{fragments/chatbot :: chatbot}"></div>
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
