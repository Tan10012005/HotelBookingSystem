spring.application.name=HotelBookingSystem

# ===============================
# MS SQL SERVER CONFIG
# ===============================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HOTELBOOKINGSYSTEM;encrypt=true;trustServerCertificate=true;
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# OPENROUTER (AI CHATBOT)
# ===============================
openrouter.api.key=${OPENROUTER_API_KEY:CHANGE_ME}
openrouter.base-url=https://openrouter.ai/api/v1
openrouter.model=openai/gpt-4o-mini
openrouter.site-url=http://localhost:8080
openrouter.app-name=HotelBookingSystem

# ===== FLYWAY CONFIGURATION =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true
spring.flyway.outOfOrder=false

# ===============================
# GOOGLE OAUTH2
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:CHANGE_ME}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:CHANGE_ME}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# ===============================
# ACTIVE PROFILE (load file secret)
# ===============================
spring.profiles.include=secret

# ========== CCCD Image Upload Config ==========
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
app.upload.cccd-dir=uploads/cccd