<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${room.id} != null ? 'Sửa phòng — Admin' : 'Thêm phòng — Admin'">Form phòng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
    <style>
        :root {
            --accent: #7c3aed;
            --sidebar: #1e1b4b;
            --primary: #006340;
            --danger: #dc2626;
            --success: #27ae60;
            --muted: #6b7280;
            --card-bg: #fff;
            --bg: #f5f3ff;
            --radius: 12px;
            --shadow: 0 12px 40px rgba(11, 24, 40, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: #1f2937;
        }

        /* ===== SIDEBAR ===== */
        .sidebar { width: 240px; position: fixed; top: 0; left: 0; height: 100vh; background: var(--sidebar); padding: 28px 0; z-index: 100; }
        .sidebar-logo { color: white; font-size: 17px; font-weight: 700; padding: 0 24px 28px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-menu { list-style: none; margin: 20px 0 0; padding: 0; }
        .sidebar-menu a { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: rgba(255,255,255,0.12); color: white; border-left: 3px solid var(--accent); padding-left: 21px; }
        .sidebar-menu a.active { background: rgba(124,58,237,0.25); }

        /* ===== MAIN ===== */
        .main { margin-left: 240px; padding: 32px; }

        .container {
            max-width: 640px;
            background: rgba(255, 255, 255, 0.96);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--accent);
        }

        h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f3f4f6;
            color: var(--accent);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .back-link:hover {
            background: #e5e7eb;
            transform: translateX(-2px);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #1f2937;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select {
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            background: white;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: #9ca3af;
        }

        select { cursor: pointer; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        button[type="submit"] {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(124, 58, 237, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .button-cancel {
            flex: 1;
            padding: 14px;
            background: #f3f4f6;
            color: #374151;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button-cancel:hover {
            background: #e5e7eb;
            border-color: #d1d5db;
        }

        .info-box {
            background: #faf5ff;
            border-left: 4px solid var(--accent);
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #5b21b6;
            margin-bottom: 20px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 24px;
            }

            h2 {
                font-size: 24px;
            }

            .page-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-logo">🏨 Hotel Admin</div>
    <ul class="sidebar-menu">
        <li><a th:href="@{/admin/dashboard}"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
        <li><a th:href="@{/admin/users}"><i class="fa-solid fa-users"></i> Người dùng</a></li>
        <li><a th:href="@{/admin/rooms}" class="active"><i class="fa-solid fa-door-open"></i> Phòng</a></li>
        <li><a th:href="@{/admin/bookings}"><i class="fa-solid fa-calendar-check"></i> Booking</a></li>
        <li><a th:href="@{/admin/roomchanges}"><i class="fa-solid fa-arrows-rotate"></i> Đổi phòng</a></li>
        <li><a th:href="@{/admin/logout}"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a></li>
    </ul>
</div>

<!-- Main -->
<div class="main">
    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h2 th:text="${room.id} != null ? '✏️ Sửa phòng' : '➕ Thêm phòng'">Form</h2>
            <a th:href="@{/admin/rooms}" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
        </div>

        <!-- Info Box -->
        <div th:if="${room.id} == null" class="info-box">
            ℹ️ Tạo phòng mới bằng cách điền thông tin bên dưới
        </div>

        <!-- Add Room Form -->
        <form th:if="${room.id} == null" th:action="@{/admin/rooms}" method="post">
            <div class="form-group">
                <label for="roomNumber_add">📍 Số phòng <span style="color: var(--danger);">*</span></label>
                <input type="text" id="roomNumber_add" name="roomNumber" placeholder="VD: 101, A01..." required/>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="roomTypeId_add">🏨 Loại phòng <span style="color: var(--danger);">*</span></label>
                    <select id="roomTypeId_add" name="roomTypeId" required>
                        <option value="">-- Chọn loại phòng --</option>
                        <option th:each="t : ${types}" th:value="${t.id}" th:text="${t.name}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="pricePerNight_add">💰 Giá / đêm (VND) <span style="color: var(--danger);">*</span></label>
                    <input type="number" id="pricePerNight_add" name="pricePerNight" placeholder="VD: 500000" min="0" step="10000" required/>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/rooms}" class="button-cancel">Hủy</a>
                <button type="submit">✓ Tạo phòng</button>
            </div>
        </form>

        <!-- Edit Room Form -->
        <form th:if="${room.id} != null" th:action="@{/admin/rooms/{id}/update(id=${room.id})}" method="post">
            <div class="info-box">
                ℹ️ Cập nhật thông tin phòng
            </div>

            <div class="form-group">
                <label for="roomNumber_edit">📍 Số phòng <span style="color: var(--danger);">*</span></label>
                <input type="text" id="roomNumber_edit" name="roomNumber" th:value="${room.roomNumber}" required/>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="roomTypeId_edit">🏨 Loại phòng <span style="color: var(--danger);">*</span></label>
                    <select id="roomTypeId_edit" name="roomTypeId" required>
                        <option th:each="t : ${types}" th:value="${t.id}" th:selected="${t.id == room.roomType.id}"
                                th:text="${t.name}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="pricePerNight_edit">💰 Giá / đêm (VND) <span style="color: var(--danger);">*</span></label>
                    <input type="number" id="pricePerNight_edit" name="pricePerNight" th:value="${room.pricePerNight}" min="0" step="10000" required/>
                </div>
            </div>

            <div class="form-group">
                <label for="status_edit">🔔 Trạng thái <span style="color: var(--danger);">*</span></label>
                <select id="status_edit" name="status" required>
                    <option th:each="s : ${T(com.hotelbookingsystem.enums.RoomStatus).values()}" th:value="${s}" th:text="${s}"
                            th:selected="${s == room.status}"></option>
                </select>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/rooms}" class="button-cancel">Hủy</a>
                <button type="submit">✓ Cập nhật</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
