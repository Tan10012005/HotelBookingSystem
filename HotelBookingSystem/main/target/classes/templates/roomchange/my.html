<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Yêu Cầu Đổi Phòng - Hotel Booking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          crossorigin="anonymous"/>
    <style>
        :root {
            --accent: #7c3aed;
            --card-bg: rgba(255, 255, 255, 0.96);
            --muted: #6b7280;
            --radius: 18px;
            --shadow: 0 12px 40px rgba(11, 24, 40, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 30%, #f093fb 60%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gs 15s ease infinite;
        }

        @keyframes gs {
            0% {
                background-position: 0% 50%
            }
            50% {
                background-position: 100% 50%
            }
            100% {
                background-position: 0% 50%
            }
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 32px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        h2.page-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: #1f2937;
            margin: 0 0 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 14px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        thead th {
            font-weight: 700;
            padding: 10px 14px;
            text-align: left;
            color: #374151;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr {
            background: #fff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
            border-radius: 10px;
            transition: all 0.2s;
        }

        tbody tr:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.1);
        }

        td {
            padding: 14px;
            font-size: 14px;
            vertical-align: middle;
            border: none;
        }

        td:first-child {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        td:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-pending {
            background: #fef3c7;
            color: #92400e;
            border-left: 3px solid #f59e0b;
        }

        .badge-approved {
            background: #d1fae5;
            color: #065f46;
            border-left: 3px solid #10b981;
        }

        .badge-rejected {
            background: #fee2e2;
            color: #7f1d1d;
            border-left: 3px solid #ef4444;
        }

        .room-arrow {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .room-chip {
            background: #f3f4f6;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            color: #374151;
        }

        .room-chip.new {
            background: var(--accent);
            color: white;
        }

        .price-diff {
            font-weight: 700;
        }

        .price-diff.positive {
            color: #dc2626;
        }

        .price-diff.zero {
            color: #059669;
        }

        .btn-new {
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: white;
            border: none;
            padding: 11px 22px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.3);
        }

        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(124, 58, 237, 0.4);
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .empty-message {
            text-align: center;
            color: var(--muted);
            padding: 50px 20px;
            background: #f9fafb;
            border-radius: 12px;
        }

        .admin-note {
            font-size: 12px;
            color: #dc2626;
            margin-top: 4px;
            font-style: italic;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="container">
    <h2 class="page-title">🔄 Yêu Cầu Đổi Phòng Của Tôi</h2>

    <div class="top-actions">
        <a href="/roomchange/select" class="btn-new">
            <i class="fa-solid fa-plus"></i> Tạo yêu cầu mới
        </a>
    </div>

    <table th:if="${requests != null and !#lists.isEmpty(requests)}">
        <thead>
        <tr>
            <th>#</th>
            <th>Booking</th>
            <th>Đổi phòng</th>
            <th>Check-in</th>
            <th>Chênh lệch</th>
            <th>Ngày gửi</th>
            <th>Trạng thái</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="req : ${requests}">
            <td th:text="${req.id}"></td>
            <td><strong>#<span th:text="${req.booking.id}"></span></strong></td>
            <td>
                <div class="room-arrow">
                    <span class="room-chip" th:text="${req.oldRoom.roomNumber}"></span>
                    <i class="fa-solid fa-arrow-right" style="color:#7c3aed;"></i>
                    <span class="room-chip new" th:text="${req.newRoom.roomNumber}"></span>
                </div>
            </td>
            <td th:text="${#temporals.format(req.booking.checkIn, 'dd/MM/yyyy')}"></td>
            <td>
                    <span th:if="${req.priceDifference.compareTo(T(java.math.BigDecimal).ZERO) > 0}"
                          class="price-diff positive"
                          th:text="'+' + ${#numbers.formatDecimal(req.priceDifference, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                    </span>
                <span th:if="${req.priceDifference.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                      class="price-diff zero">Không phụ thu</span>
            </td>
            <td th:text="${#temporals.format(req.requestedAt, 'dd/MM/yyyy HH:mm')}"></td>
            <td>
                <span th:if="${req.status.name() == 'PENDING'}" class="badge badge-pending">⏳ Chờ duyệt</span>
                <span th:if="${req.status.name() == 'APPROVED'}" class="badge badge-approved">✓ Đã duyệt</span>
                <span th:if="${req.status.name() == 'REJECTED'}" class="badge badge-rejected">✗ Từ chối</span>
                <div th:if="${req.adminNote != null and req.status.name() == 'REJECTED'}" class="admin-note">
                    Lý do: <span th:text="${req.adminNote}"></span>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${requests == null or #lists.isEmpty(requests)}" class="empty-message">
        <p>📭 Bạn chưa có yêu cầu đổi phòng nào. <a href="/roomchange/select" style="color: #7c3aed; font-weight: 600;">Tạo
            yêu cầu ngay!</a></p>
    </div>
</div>
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
